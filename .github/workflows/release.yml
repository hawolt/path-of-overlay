name: Build & Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        shell: powershell
        run: |
          mvn clean package -DskipTests
          Get-ChildItem -Path target -Force

      - name: Verify and rename JAR
        shell: powershell
        run: |
          $jar = Get-ChildItem -Path "target" -Filter "*-jar-with-dependencies.jar" | Select-Object -First 1
          if (-not $jar) { Write-Error "No JAR found"; exit 1 }
          Copy-Item $jar.FullName "target/application.jar"
          Write-Host "JAR ready: application.jar"

      - name: Extract version from pom.xml
        id: version
        shell: powershell
        run: |
          [xml]$pom = Get-Content pom.xml
          $version = "$($pom.project.artifactId)-$($pom.project.version)"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build minimal JRE with jlink
        shell: powershell
        run: |
          $modules = "java.base,java.desktop,java.xml,java.logging,jdk.unsupported,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.crypto.mscapi"

          jlink `
            --module-path "$env:JAVA_HOME\jmods" `
            --add-modules $modules `
            --strip-debug `
            --no-man-pages `
            --no-header-files `
            --compress=2 `
            --output "minimal-jre"

          Write-Host "Minimal JRE size:"
          (Get-ChildItem -Recurse "minimal-jre" | Measure-Object -Property Length -Sum).Sum / 1MB

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          default: true
          override: true

      - name: Prepare files for Rust build
        shell: powershell
        run: |
          Copy-Item "target/application.jar" "rust-wrapper/application.jar"
          Compress-Archive -Path "minimal-jre\*" -DestinationPath "rust-wrapper/jre.zip"

          # Force full Rust rebuild by wiping incremental cache
          if (Test-Path "rust-wrapper/target") {
            Remove-Item -Recurse -Force "rust-wrapper/target"
          }

          Write-Host "jre.zip size:"
          "{0:N1} MB" -f ((Get-Item "rust-wrapper/jre.zip").Length / 1MB)

      - name: Convert logo to ICO
        shell: powershell
        run: |
          & magick "src/main/resources/logo.png" `
            -define icon:auto-resize="256,128,64,48,32,16" `
            "rust-wrapper/logo.ico"

          if (-not (Test-Path "rust-wrapper/logo.ico")) {
            Write-Error "logo.ico was NOT created"
            exit 1
          }

          # Write resources.rc using a simple relative path - build.rs sets
          # current_dir to CARGO_MANIFEST_DIR (rust-wrapper/) so rc.exe will
          # find logo.ico right next to resources.rc with no path issues.
          Set-Content -Path "rust-wrapper/resources.rc" -Value 'IDI_ICON1 ICON "logo.ico"'

          Write-Host "resources.rc contents:"
          Get-Content "rust-wrapper/resources.rc"
          Write-Host "logo.ico size: $((Get-Item 'rust-wrapper/logo.ico').Length) bytes"

      - name: Build Rust wrapper
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --manifest-path rust-wrapper/Cargo.toml
        env:
          CARGO_INCREMENTAL: "0"

      - name: Rename executable
        shell: powershell
        run: |
          $exe = Get-ChildItem "rust-wrapper/target/release" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No executable found"; exit 1 }
          Copy-Item $exe.FullName "rust-wrapper/target/release/poe-overlay.exe"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "${{ steps.version.outputs.VERSION }}"
          release_name: "${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload exe
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: rust-wrapper/target/release/poe-overlay.exe
          asset_name: "${{ steps.version.outputs.VERSION }}.exe"
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload jar
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: target/application.jar
          asset_name: "${{ steps.version.outputs.VERSION }}.jar"
          asset_content_type: application/java-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}